name: Bug report
description: Report something that is broken or behaving incorrectly.
title: '[Bug]: '
labels: ['bug']

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is wrong?
      placeholder: A short description of the bug.
    validations:
      required: true

  - type: textarea
    id: current-behavior
    attributes:
      label: Current behavior
      description: What happens now?
      placeholder: Describe the actual behavior.
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What should happen instead?
      placeholder: Describe the expected behavior.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can the issue be reproduced?
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Notice ...
    validations:
      required: false

  - type: textarea
    id: scope
    attributes:
      label: Affected area
      description: What page, route, component, workflow, or content is affected?
      placeholder: e.g. homepage, article page, sitemap generation, RSS feed
    validations:
      required: false

  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Include screenshots, links, logs, browser details, or anything else useful.
      placeholder: Paste relevant context here.
      render: shell
    validations:
      required: false
