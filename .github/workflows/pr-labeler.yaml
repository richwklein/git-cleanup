name: PR labeler

on:
  pull_request_target:
    types: [opened, reopened, synchronize, edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: label
    runs-on: ubuntu-latest
    steps:
      - name: Apply labels from branch prefix
        uses: actions/labeler@v6.1.0
        with:
          configuration-path: .github/labeler.yml
          sync-labels: true
